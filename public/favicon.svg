<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- R stem -->
  <rect x="8" y="7" width="4" height="18" rx="1" fill="white" opacity="0.95"/>
  <!-- R top bar -->
  <rect x="8" y="7" width="12" height="4" rx="1" fill="white" opacity="0.95"/>
  <!-- R mid bar -->
  <rect x="8" y="14.5" width="10" height="3.5" rx="1" fill="white" opacity="0.95"/>
  <!-- R right post -->
  <rect x="17" y="7" width="3" height="11" rx="1" fill="white" opacity="0.95"/>
  <!-- R leg -->
  <polygon points="12,18 20,25 16.5,25 8.5,18" fill="white" opacity="0.85"/>
  <!-- Arrow line -->
  <polyline points="9,24 13,20 16,22 22,16 24,16" stroke="#bfdbfe" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow head -->
  <polyline points="21.5,13.5 24,16 21.5,18.5" stroke="#bfdbfe" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
