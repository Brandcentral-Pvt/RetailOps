name: Deploy to Production

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -e
          mkdir -p ~/.ssh
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

          echo "🚀 Deploying ${{ github.sha }} to $HOST"

          ssh $USER@$HOST << 'DEPLOY'
          set -e

          echo "📡 Pulling latest code..."
          cd /var/www/retail-ops
          git fetch origin
          git reset --hard origin/main

          echo "📦 Installing backend dependencies..."
          cd backend
          npm ci --omit=dev 2>&1 | tail -3

          echo "📁 Ensuring directories..."
          mkdir -p logs uploads/exports uploads/temp

          echo "🔄 Restarting API..."
          pm2 restart brand-central-api --update-env 2>/dev/null || \
          pm2 start server.js --name brand-central-api \
            --max-memory-restart 3G \
            --node-options="--max-old-space-size=4096"

          echo "💾 Saving PM2 state..."
          pm2 save 2>/dev/null || true

          echo "✅ Deploy complete"
          pm2 status
          DEPLOY

      - name: Health check
        run: |
          echo "⏳ Waiting for server..."
          for i in 1 2 3 4 5; do
            sleep 5
            if curl -sf --max-time 10 ${{ secrets.DEPLOY_HOST }}/api/health 2>/dev/null; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i/5..."
          done
          echo "⚠️ Health check failed — server may still be starting"

      - name: Summary
        if: always()
        run: |
          echo "🚀 Deployment summary"
          echo "   Commit: ${{ github.sha }}"
          echo "   Status: ${{ job.status }}"
          echo "   Time:   $(date -u +%Y-%m-%dT%H:%M:%SZ)"
