name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production
    concurrency: production-deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to production server
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Upload build to production
          rsync -avz --delete dist/ "$PROD_USER@$PROD_HOST:/var/www/production/"
          
          # Deploy backend on production
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$PROD_USER@$PROD_HOST" "
            cd /var/app/production &&
            git pull origin main &&
            npm ci --production &&
            pm2 restart production-backend
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
