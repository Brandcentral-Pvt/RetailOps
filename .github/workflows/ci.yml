name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend: Lint + Type Check + Build ──────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Type check
        run: npm run typecheck
        continue-on-error: false

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://data.brandcentral.in/api
          VITE_SOCKET_URL: https://data.brandcentral.in
        continue-on-error: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 3

  # ─── Backend: Syntax Check + Tests ────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax check all controllers
        working-directory: backend
        run: |
          echo "Checking syntax of all controllers..."
          for f in controllers/*.js; do
            node -c "$f" || exit 1
          done
          echo "Checking syntax of all services..."
          for f in services/*.js; do
            node -c "$f" || exit 1
          done
          echo "Checking syntax of email templates..."
          find emails -name "*.js" -exec node -c {} \;
          echo "✅ All backend files pass syntax check"

      - name: Check for required exports
        working-directory: backend
        run: |
          echo "Verifying key controllers export correctly..."
          node -e "require('./controllers/asinController'); console.log('✅ asinController OK')"
          node -e "require('./controllers/sellerController'); console.log('✅ sellerController OK')"
          node -e "require('./controllers/uploadController'); console.log('✅ uploadController OK')"
          node -e "require('./controllers/authController'); console.log('✅ authController OK')"
          node -e "require('./services/emailService'); console.log('✅ emailService OK')"
          node -e "require('./emails'); console.log('✅ emails index OK')"

  # ─── Security: Dependency Audit ───────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Root audit
        run: npm audit --audit-level=high || true

      - name: Backend audit
        working-directory: backend
        run: npm audit --audit-level=high || true
