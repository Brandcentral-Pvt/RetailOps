name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend: Lint + Build ────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://data.brandcentral.in/api
          VITE_SOCKET_URL: https://data.brandcentral.in

  # ─── Backend: Syntax + Import Check ────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Syntax check
        working-directory: backend
        run: |
          echo "Checking syntax..."
          find controllers services emails utils -name "*.js" -exec node -c {} \; || exit 1
          echo "✅ Syntax OK"

      - name: Verify imports
        working-directory: backend
        run: |
          node -e "require('./controllers/asinController'); console.log('✅ asinController')"
          node -e "require('./controllers/sellerController'); console.log('✅ sellerController')"
          node -e "require('./controllers/uploadController'); console.log('✅ uploadController')"
          node -e "require('./controllers/authController'); console.log('✅ authController')"
          node -e "require('./services/emailService'); console.log('✅ emailService')"
          node -e "require('./emails'); console.log('✅ emails')"

  # ─── Security: Audit ───────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Audit root
        run: npm audit --audit-level=high --omit=dev || true

      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev || true
