name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ============================================
  # LINT & CHECK (Frontend + Backend)
  # ============================================
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ==================
      # Frontend Check
      # ==================
      - name: Install frontend deps
        run: |
          npm ci --legacy-peer-deps

      - name: Run ESLint
        run: |
          npm run lint -- --max-warnings=0 || true

      - name: Check TypeScript types
        run: |
          npm run typecheck || true

      - name: Build Frontend (Verify Compilation)
        run: |
          npm run build

      # ==================
      # Backend Check
      # ==================
      - name: Install backend deps
        run: |
          cd backend
          npm ci

      - name: Check backend syntax
        run: |
          cd backend
          find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node -c

      # ==================
      # Report Results
      # ==================
      - name: Show results
        if: always()
        run: |
          echo "✅ All validation builds and syntax checks completed"

  # ============================================
  # DEPLOY TO VPS (on merge to main)
  # ============================================
  deploy:
    needs: lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: ${{ secrets.VPS_KNOWN_HOSTS }}
          config: |
            Host deploy-target
              HostName ${{ secrets.VPS_HOST }}
              User ${{ secrets.VPS_USER }}
              IdentityFile ~/.ssh/id_ed25519
              StrictHostKeyChecking accept-new

      - name: Verify SSH connection
        run: ssh deploy-target "echo SSH connection successful"

      - name: Execute Deploy Script on Remote VPS
        run: |
          BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/})
          echo "🚀 Deploying branch: $BRANCH_NAME"

          ssh deploy-target bash -s << 'EOSSH'
            set -e
            DEPLOY_PATH=/var/www/retail-ops
            echo "📂 Navigating to $DEPLOY_PATH"
            cd "$DEPLOY_PATH" || { echo "Directory $DEPLOY_PATH not found!"; exit 1; }

            git fetch origin
            git checkout "origin/$BRANCH_NAME" -- deploy.sh
            chmod +x deploy.sh
            ./deploy.sh -b "$BRANCH_NAME"

            echo "✅ Deployment complete!"
          EOSSH

      - name: Final verification
        run: |
          echo "✅ Github Workflow successfully triggered remote deployment"